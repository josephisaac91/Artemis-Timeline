<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Curator's Pick — Artemis II Photo Voter</title>
<meta name="robots" content="noindex">
<style>
  :root {
    --bg: #07090d;
    --bg-2: #0e131a;
    --fg: #e7eef7;
    --muted: #8a96a6;
    --accent: #ff8a3d;
    --accent-2: #4cc8ff;
    --gold: #ffd166;
    --green: #3ddc97;
    --border: #1d2632;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
               -webkit-font-smoothing: antialiased; }

  header {
    position: sticky; top: 0; z-index: 50;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(7, 9, 13, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  header .row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; max-width: 1600px; margin: 0 auto;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 18px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 10px;
  }
  header h1 .badge {
    font-size: 11px;
    background: rgba(61, 220, 151, 0.15);
    color: var(--green);
    border: 1px solid rgba(61, 220, 151, 0.3);
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
  }
  header .stats {
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  header .stats em { color: var(--fg); font-style: normal; font-weight: 700; }
  header .stats em.selected-count { color: var(--green); }

  .preload {
    display: none; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .preload.active { display: inline-flex; }
  .preload .bar {
    width: 80px; height: 4px;
    background: var(--bg-2);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .preload .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-2), var(--green));
    width: 0%;
    transition: width 200ms ease;
  }
  .preload button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
  }
  .preload button:hover { color: var(--fg); }
  .preload.done .fill { background: var(--green); }
  .preload.done button { display: none; }

  .toolbar {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .btn {
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--fg);
    padding: 6px 11px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 12px;
    text-decoration: none;
    font-family: inherit;
    transition: background 120ms ease, border-color 120ms ease;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:hover { background: #14202c; border-color: #2a3947; }
  .btn.active {
    background: rgba(61, 220, 151, 0.18);
    border-color: rgba(61, 220, 151, 0.5);
    color: var(--green);
  }
  .btn.danger:hover { background: rgba(255, 84, 102, 0.15); border-color: rgba(255, 84, 102, 0.4); color: #ff8090; }

  main {
    padding: 20px 12px 100px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px)  { .grid { grid-template-columns: 1fr; gap: 14px; } }

  .card {
    position: relative;
    background: #050810;
    border: 2px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 120ms ease, transform 80ms ease;
  }
  .card:hover { border-color: #2a3947; }
  .card.selected {
    border-color: var(--green);
    box-shadow: 0 0 0 2px rgba(61, 220, 151, 0.25);
  }
  .card.selected:hover { border-color: var(--green); }
  .card:active { transform: scale(0.995); }

  .card .photo {
    aspect-ratio: 3 / 2;
    background: #050810;
    overflow: hidden;
    position: relative;
  }
  .card img {
    width: 100%; height: 100%; object-fit: contain;
    display: block;
    opacity: 0;
    transition: opacity 200ms ease;
    user-select: none;
    -webkit-user-drag: none;
  }
  .card img.loaded { opacity: 1; }
  .card .rank {
    position: absolute;
    top: 6px; left: 6px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-weight: 800;
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 4px;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }
  .card .check {
    position: absolute;
    top: 6px; right: 6px;
    width: 28px; height: 28px;
    background: rgba(0,0,0,0.55);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 14px;
    font-weight: 800;
    color: transparent;
    transition: all 120ms ease;
    pointer-events: none;
  }
  .card.selected .check {
    background: var(--green);
    border-color: var(--green);
    color: #061b11;
  }
  .card .zoom {
    position: absolute;
    bottom: 6px; right: 6px;
    width: 30px; height: 30px;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 6px;
    cursor: zoom-in;
    display: grid; place-items: center;
    font-size: 14px;
    z-index: 2;
    transition: background 120ms ease;
  }
  .card .zoom:hover { background: rgba(0,0,0,0.85); }
  .card .meta {
    padding: 5px 8px 6px;
    font-size: 10px;
    color: var(--muted);
    display: flex; justify-content: space-between; gap: 4px;
    font-variant-numeric: tabular-nums;
    border-top: 1px solid var(--border);
  }
  .card .meta strong { color: var(--fg); font-weight: 700; }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.94);
    display: none;
    z-index: 200;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox .lb-stage {
    position: absolute; inset: 0;
    overflow: hidden;
    cursor: grab;
    touch-action: none;
  }
  .lightbox .lb-stage.grabbing { cursor: grabbing; }
  .lightbox .lb-stage.zoomed-in { cursor: grab; }
  .lightbox img.lb-img {
    position: absolute;
    top: 50%; left: 50%;
    max-width: 95vw; max-height: 90vh;
    object-fit: contain;
    border-radius: 4px;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    transition: transform 180ms ease;
    user-select: none;
    -webkit-user-drag: none;
    will-change: transform;
  }
  .lightbox img.lb-img.dragging { transition: none; }
  .lightbox .lb-zoom-hint {
    position: absolute;
    bottom: 60px; left: 50%; transform: translateX(-50%);
    color: var(--muted);
    font-size: 11px;
    background: rgba(0,0,0,0.5);
    padding: 4px 10px;
    border-radius: 999px;
    pointer-events: none;
    opacity: 0.8;
  }
  .lightbox .lb-zoom-controls {
    position: absolute;
    bottom: 60px; right: 14px;
    display: flex; flex-direction: column; gap: 6px;
    z-index: 5;
  }
  .lightbox .lb-zoom-controls button {
    width: 36px; height: 36px;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
  }
  .lightbox .lb-zoom-controls button:hover { background: rgba(255,255,255,.18); }
  .lightbox .lb-close {
    position: absolute; top: 14px; right: 14px;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: grid; place-items: center;
  }
  .lightbox .lb-toggle {
    position: absolute; top: 14px; left: 14px;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .lightbox .lb-toggle.selected {
    background: var(--green);
    border-color: var(--green);
    color: #061b11;
  }
  .lightbox .lb-info {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    text-align: center;
    color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
  }
  .lightbox .lb-info a { margin-left: 12px; color: var(--accent-2); }

  .spin {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: sp 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes sp { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  /* Export modal */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    z-index: 300;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal.open { display: flex; }
  .modal-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 600px;
    max-height: 80vh;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .modal-card h3 {
    margin: 0;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-card h3 button {
    background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer;
  }
  .modal-card .body { padding: 16px 20px; overflow-y: auto; }
  .modal-card textarea {
    width: 100%;
    height: 240px;
    background: #050810;
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    resize: vertical;
  }
  .modal-card .actions {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--green);
    color: #061b11;
    padding: 10px 18px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 13px;
    z-index: 400;
    opacity: 0;
    transition: opacity 200ms ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="row">
    <h1>Curator's Pick <span class="badge">private</span></h1>
    <div class="stats">
      <span><em id="stat-total">—</em> photos</span>
      <span><em id="stat-selected" class="selected-count">0</em> selected</span>
      <span class="preload" id="preload">
        <span id="preload-label">Preloading 0/1000</span>
        <span class="bar"><span class="fill" id="preload-fill"></span></span>
        <button id="preload-cancel" title="Cancel preloading">✕</button>
      </span>
    </div>
    <div class="toolbar">
      <button class="btn" id="btn-show-selected" title="Show only your picks">Show selected</button>
      <button class="btn" id="btn-export">Export…</button>
      <button class="btn danger" id="btn-clear" title="Clear all selections">Clear</button>
      <a class="btn" href="./">← Hub</a>
    </div>
  </div>
</header>

<main id="main">
  <div class="empty"><span class="spin"></span> Loading top 1000…</div>
</main>

<div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
  <div class="lb-stage" id="lb-stage">
    <img id="lb-img" class="lb-img" alt="">
  </div>
  <button class="lb-close" id="lb-close" aria-label="Close">✕</button>
  <button class="lb-toggle" id="lb-toggle">☆ Pick this</button>
  <div class="lb-zoom-controls">
    <button id="lb-zoom-in"  title="Zoom in (+)">+</button>
    <button id="lb-zoom-out" title="Zoom out (−)">−</button>
    <button id="lb-zoom-fit" title="Reset (0)">⤢</button>
  </div>
  <div class="lb-zoom-hint">scroll / pinch to zoom · drag to pan · double-click to toggle</div>
  <div class="lb-info">
    <span id="lb-id"></span>
    <a id="lb-nasa" target="_blank" rel="noopener">View on NASA →</a>
  </div>
</div>

<div id="modal" class="modal" role="dialog" aria-modal="true">
  <div class="modal-card">
    <h3>
      <span><span id="mod-count">0</span> selected</span>
      <button id="mod-close" aria-label="Close">✕</button>
    </h3>
    <div class="body">
      <p style="margin:0 0 10px; color:var(--muted); font-size:12px;">
        One GUID per line. Paste anywhere or use the buttons below.
      </p>
      <textarea id="mod-text" readonly></textarea>
    </div>
    <div class="actions">
      <button class="btn" id="mod-copy">Copy</button>
      <button class="btn" id="mod-csv">Copy CSV (with rank)</button>
      <button class="btn" id="mod-json">Download JSON</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">Copied!</div>

<script defer src="/_vercel/insights/script.js"></script>

<script>
(() => {
  const API = "https://photovote-api.hankmt.workers.dev";
  const R2  = "https://pub-1f1ce68455c0432ea65ac3155a6b2409.r2.dev";
  const NASA_DETAIL = "https://eol.jsc.nasa.gov/SearchPhotos/photo.pl?";
  const NASA_FULL   = "https://eol.jsc.nasa.gov/DatabaseImages/ESC/large/ART002";
  const FETCH_N = 1000;
  const STORAGE_KEY = "photovote-curate-selections-v1";

  const $ = s => document.querySelector(s);

  function thumbUrl(g) { return `${R2}/thumbs/${g}.jpg`; }
  function largeUrl(g) { return `${R2}/large/${g}.jpg`; } // top 200 only (mirrored)
  function fullUrl(g)  { return `${NASA_FULL}/${g}.JPG`; }
  function nasaDetailUrl(g) {
    const m = g.match(/^(ART\d+)-([A-Z])-(\d+)$/);
    return m ? `${NASA_DETAIL}mission=${m[1]}&roll=${m[2]}&frame=${m[3]}` : NASA_DETAIL;
  }
  // Number of top photos that have been mirrored to R2 /large/ (1800px @ Q85, ~300 KB each).
  // For ranks ≤ this, prefer the R2 mirror for both the lightbox and the preloader —
  // it's an order of magnitude faster and bandwidth-friendlier than NASA full-res.
  const R2_MIRROR_TOP = 200;
  function bigUrl(rank, guid) {
    return rank <= R2_MIRROR_TOP ? largeUrl(guid) : fullUrl(guid);
  }

  // ─── Selection state ───
  function loadSelections() {
    try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]")); }
    catch { return new Set(); }
  }
  function saveSelections(set) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
  }
  let selected = loadSelections();
  let allRows = [];           // [{guid, rank, picks, shown, rate}, ...]
  let showOnlySelected = false;

  function updateStats() {
    $("#stat-selected").textContent = selected.size;
  }
  updateStats();

  // ─── Grid render ───
  function renderGrid() {
    const main = $("#main");
    let rows = allRows;
    if (showOnlySelected) rows = rows.filter(r => selected.has(r.guid));

    if (!rows.length) {
      main.innerHTML = `<div class="empty">${
        showOnlySelected
          ? "No picks yet. Click photos in the grid to add them."
          : "No photos returned."
      }</div>`;
      return;
    }

    const grid = document.createElement("div");
    grid.className = "grid";
    rows.forEach(row => grid.appendChild(makeCard(row)));
    main.innerHTML = "";
    main.appendChild(grid);
  }

  function makeCard(row) {
    const card = document.createElement("div");
    card.className = "card" + (selected.has(row.guid) ? " selected" : "");
    card.dataset.guid = row.guid;

    const rate = (typeof row.rate === "number")
      ? row.rate
      : (row.shown ? row.picks/row.shown : 0);
    const ratePct = Math.round(rate * 100);

    card.innerHTML = `
      <div class="photo">
        <img src="${thumbUrl(row.guid)}" alt="" loading="lazy" decoding="async">
        <span class="rank">#${row.rank}</span>
        <span class="check">✓</span>
        <button class="zoom" aria-label="Open larger view" title="Open larger view">🔍</button>
      </div>
      <div class="meta">
        <strong>${ratePct}%</strong>
        <span>${row.picks ?? 0}/${row.shown ?? 0}</span>
      </div>
    `;

    const img = card.querySelector("img");
    img.addEventListener("load", () => img.classList.add("loaded"));

    card.addEventListener("click", e => {
      if (e.target.closest(".zoom")) return; // zoom handled separately
      toggleSelect(row.guid, card);
    });
    card.querySelector(".zoom").addEventListener("click", e => {
      e.stopPropagation();
      openLightbox(row);
    });
    return card;
  }

  function toggleSelect(guid, card) {
    if (selected.has(guid)) {
      selected.delete(guid);
      card?.classList.remove("selected");
    } else {
      selected.add(guid);
      card?.classList.add("selected");
    }
    saveSelections(selected);
    updateStats();
    // If we're filtered to "only selected" and they just removed one, drop it from view
    if (showOnlySelected && card && !selected.has(guid)) {
      card.remove();
      if (!$("#main .card")) renderGrid(); // rerender empty state
    }
  }

  // ─── Lightbox with zoom/pan ───
  let lbCurrentGuid = null;
  // Transform state: image is centered with translate(-50%,-50%); we compose
  // an extra translate(tx,ty) and scale(s) on top of that. Pan offsets are in
  // viewport pixels; we scale them with `s` so cursor-anchored zoom works.
  let zScale = 1, zTx = 0, zTy = 0;
  const Z_MIN = 1, Z_MAX = 8;

  function applyTransform(animate = true) {
    const img = $("#lb-img");
    img.classList.toggle("dragging", !animate);
    img.style.transform =
      `translate(calc(-50% + ${zTx}px), calc(-50% + ${zTy}px)) scale(${zScale})`;
    $("#lb-stage").classList.toggle("zoomed-in", zScale > 1.001);
  }
  function resetZoom(animate = true) {
    zScale = 1; zTx = 0; zTy = 0;
    applyTransform(animate);
  }

  function openLightbox(row) {
    lbCurrentGuid = row.guid;
    resetZoom(false);
    const img = $("#lb-img");
    img.alt = row.guid;
    // Try R2 mirror first for top-200; on error, fall back to NASA full-res.
    img.onerror = () => {
      if (img.dataset.fallback !== "1" && row.rank <= R2_MIRROR_TOP) {
        img.dataset.fallback = "1";
        img.src = fullUrl(row.guid);
      }
    };
    img.dataset.fallback = "0";
    img.src = bigUrl(row.rank, row.guid);
    $("#lb-id").textContent = `#${row.rank}  ·  ${row.guid}`;
    $("#lb-nasa").href = nasaDetailUrl(row.guid);
    updateLbToggle();
    $("#lightbox").classList.add("open");
  }
  function closeLightbox() {
    $("#lightbox").classList.remove("open");
    $("#lb-img").src = "";
    lbCurrentGuid = null;
    resetZoom(false);
  }
  function updateLbToggle() {
    const btn = $("#lb-toggle");
    if (!lbCurrentGuid) return;
    if (selected.has(lbCurrentGuid)) {
      btn.textContent = "★ Picked";
      btn.classList.add("selected");
    } else {
      btn.textContent = "☆ Pick this";
      btn.classList.remove("selected");
    }
  }
  $("#lb-close").addEventListener("click", closeLightbox);
  // Click outside the image (on the dim backdrop) closes — but only when not zoomed
  $("#lightbox").addEventListener("click", e => {
    if (e.target.id === "lightbox" && zScale <= 1.001) closeLightbox();
  });
  $("#lb-toggle").addEventListener("click", e => {
    e.stopPropagation();
    if (!lbCurrentGuid) return;
    const card = document.querySelector(`.card[data-guid="${lbCurrentGuid}"]`);
    toggleSelect(lbCurrentGuid, card);
    updateLbToggle();
  });

  // ── Wheel zoom (anchored at cursor) ──
  function zoomAt(clientX, clientY, factor) {
    const stage = $("#lb-stage").getBoundingClientRect();
    // Cursor relative to stage center (where the image is anchored)
    const cx = clientX - (stage.left + stage.width / 2);
    const cy = clientY - (stage.top + stage.height / 2);

    const newScale = Math.min(Z_MAX, Math.max(Z_MIN, zScale * factor));
    if (newScale === zScale) return;
    // Keep the point under the cursor stationary:
    //   imagePoint = (cursorPoint - tx) / scale  (in image-local coords)
    // After zoom: tx' = cursorPoint - imagePoint * newScale
    const ratio = newScale / zScale;
    zTx = cx - (cx - zTx) * ratio;
    zTy = cy - (cy - zTy) * ratio;
    zScale = newScale;
    if (zScale <= 1.001) { zTx = 0; zTy = 0; }
    applyTransform(false);
  }
  $("#lb-stage").addEventListener("wheel", e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.18 : 1 / 1.18;
    zoomAt(e.clientX, e.clientY, factor);
  }, { passive: false });

  // ── Double-click toggles 2× zoom at click ──
  $("#lb-stage").addEventListener("dblclick", e => {
    if (zScale > 1.001) resetZoom(true);
    else zoomAt(e.clientX, e.clientY, 2.5);
  });

  // ── Mouse drag to pan ──
  let panning = false, panStartX = 0, panStartY = 0, panOrigTx = 0, panOrigTy = 0;
  $("#lb-stage").addEventListener("mousedown", e => {
    if (e.button !== 0) return;
    panning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panOrigTx = zTx; panOrigTy = zTy;
    $("#lb-stage").classList.add("grabbing");
    e.preventDefault();
  });
  window.addEventListener("mousemove", e => {
    if (!panning) return;
    zTx = panOrigTx + (e.clientX - panStartX);
    zTy = panOrigTy + (e.clientY - panStartY);
    applyTransform(false);
  });
  window.addEventListener("mouseup", () => {
    if (!panning) return;
    panning = false;
    $("#lb-stage").classList.remove("grabbing");
  });

  // ── Touch: pinch-zoom + single-finger pan ──
  let touchMode = null;     // 'pan' or 'pinch'
  let touchStartX = 0, touchStartY = 0;
  let touchOrigTx = 0, touchOrigTy = 0;
  let pinchStartDist = 0, pinchStartScale = 1, pinchStartCx = 0, pinchStartCy = 0;
  let pinchStartTx = 0, pinchStartTy = 0;

  function touchDist(t1, t2) {
    const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
    return Math.hypot(dx, dy);
  }
  $("#lb-stage").addEventListener("touchstart", e => {
    if (e.touches.length === 1) {
      touchMode = "pan";
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchOrigTx = zTx; touchOrigTy = zTy;
    } else if (e.touches.length === 2) {
      touchMode = "pinch";
      pinchStartDist = touchDist(e.touches[0], e.touches[1]);
      pinchStartScale = zScale;
      pinchStartTx = zTx; pinchStartTy = zTy;
      pinchStartCx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      pinchStartCy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
  }, { passive: true });

  $("#lb-stage").addEventListener("touchmove", e => {
    if (touchMode === "pan" && e.touches.length === 1 && zScale > 1.001) {
      e.preventDefault();
      zTx = touchOrigTx + (e.touches[0].clientX - touchStartX);
      zTy = touchOrigTy + (e.touches[0].clientY - touchStartY);
      applyTransform(false);
    } else if (touchMode === "pinch" && e.touches.length === 2) {
      e.preventDefault();
      const d = touchDist(e.touches[0], e.touches[1]);
      const newScale = Math.min(Z_MAX, Math.max(Z_MIN, pinchStartScale * (d / pinchStartDist)));
      const stage = $("#lb-stage").getBoundingClientRect();
      const cx = pinchStartCx - (stage.left + stage.width / 2);
      const cy = pinchStartCy - (stage.top + stage.height / 2);
      const ratio = newScale / pinchStartScale;
      zTx = cx - (cx - pinchStartTx) * ratio;
      zTy = cy - (cy - pinchStartTy) * ratio;
      zScale = newScale;
      if (zScale <= 1.001) { zTx = 0; zTy = 0; }
      applyTransform(false);
    }
  }, { passive: false });

  $("#lb-stage").addEventListener("touchend", e => {
    if (e.touches.length === 0) touchMode = null;
    else if (e.touches.length === 1) {
      touchMode = "pan";
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchOrigTx = zTx; touchOrigTy = zTy;
    }
  });

  // ── Zoom buttons ──
  $("#lb-zoom-in").addEventListener("click", e => {
    e.stopPropagation();
    const r = $("#lb-stage").getBoundingClientRect();
    zoomAt(r.left + r.width/2, r.top + r.height/2, 1.5);
  });
  $("#lb-zoom-out").addEventListener("click", e => {
    e.stopPropagation();
    const r = $("#lb-stage").getBoundingClientRect();
    zoomAt(r.left + r.width/2, r.top + r.height/2, 1/1.5);
  });
  $("#lb-zoom-fit").addEventListener("click", e => {
    e.stopPropagation();
    resetZoom(true);
  });

  // ── Keyboard ──
  document.addEventListener("keydown", e => {
    if ($("#lightbox").classList.contains("open")) {
      const r = $("#lb-stage").getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      if (e.key === "Escape") closeLightbox();
      else if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        $("#lb-toggle").click();
      } else if (e.key === "+" || e.key === "=") { e.preventDefault(); zoomAt(cx, cy, 1.5); }
      else if (e.key === "-" || e.key === "_") { e.preventDefault(); zoomAt(cx, cy, 1/1.5); }
      else if (e.key === "0") { e.preventDefault(); resetZoom(true); }
    }
    if ($("#modal").classList.contains("open") && e.key === "Escape") closeModal();
  });

  // ─── Toolbar buttons ───
  $("#btn-show-selected").addEventListener("click", () => {
    showOnlySelected = !showOnlySelected;
    $("#btn-show-selected").classList.toggle("active", showOnlySelected);
    $("#btn-show-selected").textContent = showOnlySelected
      ? `Show all (${allRows.length})`
      : "Show selected";
    renderGrid();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  $("#btn-clear").addEventListener("click", () => {
    if (selected.size === 0) return;
    if (!confirm(`Clear all ${selected.size} selections?`)) return;
    selected = new Set();
    saveSelections(selected);
    updateStats();
    document.querySelectorAll(".card.selected").forEach(c => c.classList.remove("selected"));
    if (showOnlySelected) renderGrid();
  });

  // ─── Export modal ───
  function picksInRankOrder() {
    return allRows.filter(r => selected.has(r.guid));
  }
  function openModal() {
    const picks = picksInRankOrder();
    $("#mod-count").textContent = picks.length;
    $("#mod-text").value = picks.map(r => r.guid).join("\n");
    $("#modal").classList.add("open");
  }
  function closeModal() { $("#modal").classList.remove("open"); }

  $("#btn-export").addEventListener("click", openModal);
  $("#mod-close").addEventListener("click", closeModal);
  $("#modal").addEventListener("click", e => { if (e.target === $("#modal")) closeModal(); });

  function showToast(msg) {
    const t = $("#toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1400);
  }

  $("#mod-copy").addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText($("#mod-text").value);
      showToast(`Copied ${picksInRankOrder().length} GUIDs`);
    } catch {
      $("#mod-text").select();
      document.execCommand("copy");
      showToast("Copied!");
    }
  });

  $("#mod-csv").addEventListener("click", async () => {
    const picks = picksInRankOrder();
    const lines = ["rank,guid,picks,shown,rate"];
    for (const r of picks) {
      const rate = (typeof r.rate === "number") ? r.rate : (r.shown ? r.picks/r.shown : 0);
      lines.push([r.rank, r.guid, r.picks ?? 0, r.shown ?? 0, rate.toFixed(4)].join(","));
    }
    const csv = lines.join("\n");
    try {
      await navigator.clipboard.writeText(csv);
      showToast(`Copied CSV (${picks.length} rows)`);
    } catch {
      $("#mod-text").value = csv;
      $("#mod-text").select();
      document.execCommand("copy");
      showToast("Copied CSV");
    }
  });

  $("#mod-json").addEventListener("click", () => {
    const picks = picksInRankOrder();
    const blob = new Blob([JSON.stringify({
      generated_at: new Date().toISOString(),
      count: picks.length,
      picks: picks.map(r => ({
        rank: r.rank,
        guid: r.guid,
        picks: r.picks ?? 0,
        shown: r.shown ?? 0,
        rate: (typeof r.rate === "number") ? r.rate : (r.shown ? r.picks/r.shown : 0),
      })),
    }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `artemis-curator-picks-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  // ─── Background preloader ───
  // Two-phase: first the R2-mirrored top-200 (fast, ~300 KB each, parallel x 8),
  // then NASA full-res for the rest (~1-2 MB each, parallel x 4). URLs match
  // what the lightbox actually requests, so completed preloads cache-hit
  // when you click to zoom.
  const preloadState = {
    cancelled: false,
    done: 0,
    failed: 0,
    total: 0,
    cache: new Set(),
  };
  const PRELOAD_PARALLEL_R2   = 8;
  const PRELOAD_PARALLEL_NASA = 4;

  function updatePreloadUI() {
    const total = preloadState.total;
    const done = preloadState.done + preloadState.failed;
    const pct = total ? (done / total) * 100 : 0;
    $("#preload-label").textContent = `Preloading ${done}/${total}`;
    $("#preload-fill").style.width = `${pct}%`;
    if (done >= total && total > 0) {
      $("#preload").classList.add("done");
      $("#preload-label").textContent = `Preloaded ${preloadState.done}/${total}` +
        (preloadState.failed ? ` (${preloadState.failed} failed)` : "");
      setTimeout(() => $("#preload").classList.remove("active"), 4000);
    }
  }

  function preloadOne(url, guid) {
    return new Promise(resolve => {
      if (preloadState.cancelled) return resolve("cancelled");
      const img = new Image();
      try { img.fetchPriority = "low"; } catch {}
      img.decoding = "async";
      const cleanup = () => { img.onload = null; img.onerror = null; };
      img.onload  = () => { preloadState.done++;   preloadState.cache.add(guid); cleanup(); resolve("ok"); };
      img.onerror = () => { preloadState.failed++;                                 cleanup(); resolve("err"); };
      img.src = url;
    });
  }

  async function runQueue(items, parallel) {
    let idx = 0;
    async function worker() {
      while (idx < items.length && !preloadState.cancelled) {
        const it = items[idx++];
        await preloadOne(it.url, it.guid);
        updatePreloadUI();
      }
    }
    await Promise.all(Array.from({ length: parallel }, worker));
  }

  async function startPreload() {
    if (!allRows.length) return;
    preloadState.total = allRows.length;
    preloadState.done = 0;
    preloadState.failed = 0;
    preloadState.cancelled = false;
    $("#preload").classList.remove("done");
    $("#preload").classList.add("active");
    updatePreloadUI();

    // Split into the R2 mirror (fast) and the NASA tail (slower).
    const r2Items   = [];
    const nasaItems = [];
    for (const r of allRows) {
      const url = bigUrl(r.rank, r.guid);
      const item = { url, guid: r.guid };
      if (r.rank <= R2_MIRROR_TOP) r2Items.push(item);
      else                          nasaItems.push(item);
    }

    // Phase 1: rip through the mirrored top-200 fast.
    await runQueue(r2Items, PRELOAD_PARALLEL_R2);
    if (preloadState.cancelled) return;
    // Phase 2: chew through NASA full-res in the background.
    await runQueue(nasaItems, PRELOAD_PARALLEL_NASA);
  }

  $("#preload-cancel").addEventListener("click", () => {
    preloadState.cancelled = true;
    $("#preload").classList.remove("active");
  });

  // ─── Load top 1000 ───
  async function load() {
    try {
      const r = await fetch(`${API}/top?n=${FETCH_N}&min_shown=10&sort=rate`, { cache: "no-store" });
      const data = await r.json();
      const results = (data && data.results) || [];
      allRows = results.map((row, i) => ({
        rank: i + 1,
        guid: row.guid,
        picks: row.picks ?? 0,
        shown: row.shown ?? 0,
        rate: (typeof row.rate === "number") ? row.rate : (row.shown ? row.picks/row.shown : 0),
      }));
      $("#stat-total").textContent = allRows.length;
      renderGrid();
      // Kick off background preload after grid is in the DOM so thumbs win
      // the initial bandwidth.
      setTimeout(startPreload, 800);
    } catch (err) {
      $("#main").innerHTML = `<div class="empty" style="color:#ff5466">Couldn't load: ${err.message}</div>`;
    }
  }

  load();
})();
</script>

</body>
</html>
